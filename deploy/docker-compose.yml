version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
  mnemosyne:
    build: ..
    env_file:
      - ../.env.example
    volumes:
      - ../vault:/vault
      - ../mnemosyne:/mnemosyne
    depends_on:
      - ollama
      - qdrant
volumes:
  ollama-data:
  qdrant-data:
